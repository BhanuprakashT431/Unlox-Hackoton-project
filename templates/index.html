<!DOCTYPE html>
<html>
<head>
<title>CampusFlow</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {
    margin: 0;
    display: flex;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI';
    background: #f2f2f7;
    color: #1c1c1e;
    transition: 0.3s;
}

/* DARK MODE */
.dark {
    background: #000;
    color: white;
}

/* SIDEBAR */
.sidebar {
    width: 220px;
    background: white;
    border-right: 1px solid #ddd;
    padding: 20px;
}

.dark .sidebar {
    background: #111;
}

/* MAIN */
.main {
    flex: 1;
    padding: 20px;
}

/* GRID */
.grid {
    display: grid;
    grid-template-columns: 2fr 1fr;
    gap: 20px;
}

/* CARD */
.card {
    background: white;
    border-radius: 20px;
    padding: 20px;
    box-shadow: 0 4px 20px rgba(0,0,0,0.05);
    animation: fade 0.5s ease;
}

.dark .card {
    background: #1c1c1e;
}

/* FADE */
@keyframes fade {
    from {opacity:0; transform:translateY(10px);}
    to {opacity:1;}
}

/* INPUT */
input, textarea, select {
    width: 100%;
    padding: 14px;
    border-radius: 12px;
    border: 1px solid #ddd;
    margin-top: 10px;
    background: #f9f9fb;
}

.dark input, .dark textarea, .dark select {
    background: #2c2c2e;
    color: white;
}

/* BUTTON */
button {
    margin-top: 12px;
    padding: 12px;
    border-radius: 12px;
    border: none;
    background: #007aff;
    color: white;
    cursor: pointer;
}

button:active {
    transform: scale(0.95);
}

/* TASK */
.task {
    background: #f9f9fb;
    padding: 15px;
    border-radius: 12px;
    margin-top: 10px;
}

.dark .task {
    background: #2c2c2e;
}

/* PRIORITY */
.high { color: red; }
.medium { color: orange; }
.low { color: green; }

/* STATUS */
.completed { color: green; }
.pending { color: orange; }

/* TOAST */
#toast {
    position: fixed;
    bottom: 20px;
    right: 20px;
    background: black;
    color: white;
    padding: 10px 20px;
    border-radius: 10px;
    opacity: 0;
    transition: 0.5s;
}

/* CHART */
.chart-box {
    height: 200px;
}
</style>
</head>

<body>

<div class="sidebar">
<h2>📚 CampusFlow</h2>
<button onclick="toggleTheme()">🌙 Toggle</button>
</div>

<div class="main">

<div class="grid">

<div class="card">
<h2>Tasks</h2>
<input id="search" placeholder="Search..." onkeyup="loadTasks()">
<div id="tasks"></div>
</div>

<div>

<div class="card">
<h3>Analytics</h3>
<p id="stats"></p>

<div class="chart-box">
<canvas id="chart"></canvas>
</div>

<p id="ai"></p>
</div>

<div class="card">
<h3>Add Task</h3>
<input id="title" placeholder="Task title">
<input id="date" type="datetime-local">
<textarea id="desc" placeholder="Description"></textarea>

<select id="priority">
<option value="low">Low</option>
<option value="medium">Medium</option>
<option value="high">High</option>
</select>

<button onclick="addTask()">Add Task</button>
</div>

</div>

</div>

</div>

<div id="toast"></div>

<script>

let chart;

function toggleTheme(){
    document.body.classList.toggle("dark");
}

function showToast(msg){
    let t = document.getElementById('toast');
    t.innerText = msg;
    t.style.opacity = 1;
    setTimeout(()=>t.style.opacity = 0, 2000);
}

async function addTask(){
    await fetch('/add',{
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body:JSON.stringify({
            title:title.value,
            due_date:date.value,
            description:desc.value,
            priority:priority.value
        })
    });

    showToast("Task Added 🚀");
    loadTasks();
}

async function loadTasks(){
    document.getElementById('tasks').innerHTML="Loading...";

    const res = await fetch('/tasks');
    const data = await res.json();

    let html="", done=0;

    const search = document.getElementById('search').value.toLowerCase();

    data.forEach(t=>{
        if(!t.title.toLowerCase().includes(search)) return;

        if(t.status=="completed") done++;

        html += `
        <div class="task">
            <b>${t.title}</b><br>
            ${t.due_date}<br>
            <span class="${t.priority}">${t.priority}</span><br>
            <span class="${t.status}">${t.status}</span><br>
            <button onclick="completeTask(${t.id})">✔</button>
            <button onclick="deleteTask(${t.id})">🗑</button>
        </div>`;
    });

    document.getElementById('tasks').innerHTML = html;

    document.getElementById('stats').innerText =
    `Total: ${data.length} | Done: ${done}`;

    drawChart(done, data.length-done);

    const ai = await fetch('/ai');
    const aiData = await ai.json();
    document.getElementById('ai').innerText = "🤖 " + aiData.msg;
}

function drawChart(done, pending){
    if(chart) chart.destroy();

    chart = new Chart(document.getElementById('chart'),{
        type:'doughnut',
        data:{
            labels:['Done','Pending'],
            datasets:[{
                data:[done,pending],
                backgroundColor:['green','orange']
            }]
        },
        options:{
            responsive:true,
            maintainAspectRatio:false,
            animation:{duration:800}
        }
    });
}

async function completeTask(id){
    await fetch('/complete/'+id,{method:'PUT'});
    showToast("Completed ✅");
    loadTasks();
}

async function deleteTask(id){
    await fetch('/delete/'+id,{method:'DELETE'});
    showToast("Deleted 🗑");
    loadTasks();
}

loadTasks();

</script>

</body>
</html>
